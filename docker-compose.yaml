services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backend
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./App/next-app
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
